version: '3.8'

# Project-specific database orchestration to prevent multi-project interference.
# Run with 'docker-compose -p novel_agent up -d' for complete isolation.

services:
  mongodb:
    image: mongo:latest
    container_name: novel_agent_mongodb
    ports:
      - "27017:27017"
    volumes:
      - ./mongo_data:/data/db
    restart: always

  chromadb:
    image: chromadb/chroma:latest
    container_name: novel_agent_chromadb
    ports:
      - "8000:8000"
    volumes:
      - ./chroma_db_docker:/chroma/chroma
    restart: always
